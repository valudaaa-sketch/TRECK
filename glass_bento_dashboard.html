<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRECK - Glass Bento Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
        }
        
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden flex flex-col p-4 md:p-8">

    <!-- Abstract Background Light sources for "Airy" feel -->
    <div class="fixed top-0 left-1/4 w-[500px] h-[500px] bg-indigo-900/20 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-0 right-1/4 w-[400px] h-[400px] bg-emerald-900/10 rounded-full blur-[100px] pointer-events-none z-0"></div>

    <div class="max-w-7xl mx-auto relative z-10 w-full flex-1 flex flex-col">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-10 mt-2">
            <div>
                <h1 class="text-2xl font-semibold flex items-center gap-2 text-white/90">
                    Welcome back, rahul <span class="text-xl">👋</span>
                </h1>
                <p class="text-sm text-white/50 mt-1 tracking-wide">Here's what's happening today.</p>
            </div>

            <div class="flex items-center gap-4">
                <!-- Notification bell removed as requested -->
                <button class="bg-white text-black px-5 py-2.5 rounded-full text-sm font-semibold flex items-center gap-2 hover:scale-[1.02] transition-transform shadow-lg shadow-white/5">
                    <i class="ph-bold ph-plus text-base"></i> New Task
                </button>
            </div>
        </header>

        <!-- Bento Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-1">
            
            <!-- Main Tasks Widget (Spans 2 columns) -->
            <div class="lg:col-span-2 bg-white/[0.02] backdrop-blur-xl border border-white/[0.05] rounded-[32px] p-6 md:p-8 hover:bg-white/[0.03] transition-colors group flex flex-col">
                
                <!-- Tabs and Filters -->
                <div class="flex flex-wrap gap-4 justify-between items-end mb-6 border-b border-white/5 pb-4">
                    <div class="flex gap-6">
                        <button class="text-sm font-medium pb-4 -mb-[17px] text-white border-b-2 border-white transition-colors">
                            All Tasks
                        </button>
                        <button class="text-sm font-medium pb-4 -mb-[17px] text-white/50 hover:text-white transition-colors">
                            My Tasks
                        </button>
                    </div>
                    
                    <button class="flex items-center gap-2 text-xs font-medium text-white/70 bg-white/5 border border-white/10 px-3 py-1.5 rounded-lg hover:bg-white/10 transition-colors cursor-pointer">
                        All Statuses <i class="ph-bold ph-caret-down text-sm"></i>
                    </button>
                </div>

                <!-- Task List -->
                <div class="space-y-2 overflow-y-auto pr-2">
                    
                    <!-- Task 1 -->
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between p-4 rounded-2xl hover:bg-white/5 transition-all cursor-pointer hover:scale-[1.01] gap-4 sm:gap-0">
                        <div class="flex items-center gap-4">
                            <!-- Glowing Dot Status: Critical -->
                            <div class="relative flex items-center justify-center w-4 h-4 shrink-0">
                                <div class="absolute inset-0 bg-rose-500 rounded-full blur-[4px] opacity-60"></div>
                                <div class="w-2 h-2 bg-rose-400 rounded-full relative z-10"></div>
                            </div>
                            <div>
                                <h3 class="text-sm text-white/90 font-medium transition-all">App frontend check</h3>
                                <p class="text-xs text-white/40 mt-1">School ERP <span class="mx-1">•</span> Resolved</p>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-4 sm:gap-6 ml-8 sm:ml-0">
                            <span class="text-xs flex items-center gap-1 text-white/70 bg-white/5 px-2 py-1 rounded-md border border-white/5">
                                <i class="ph-bold ph-arrow-up-right text-white/50"></i> Critical
                            </span>
                            <span class="text-xs font-medium tracking-wider text-white/70">26/06/2026</span>
                        </div>
                    </div>

                    <!-- Task 2 -->
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between p-4 rounded-2xl hover:bg-white/5 transition-all cursor-pointer hover:scale-[1.01] gap-4 sm:gap-0">
                        <div class="flex items-center gap-4">
                            <!-- Glowing Dot Status: Resolved -->
                            <div class="relative flex items-center justify-center w-4 h-4 shrink-0">
                                <div class="absolute inset-0 bg-emerald-500 rounded-full blur-[4px] opacity-60"></div>
                                <div class="w-2 h-2 bg-emerald-400 rounded-full relative z-10"></div>
                            </div>
                            <div>
                                <h3 class="text-sm text-white/50 line-through transition-all">Heb</h3>
                                <p class="text-xs text-white/40 mt-1">School ERP <span class="mx-1">•</span> Resolved</p>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-4 sm:gap-6 ml-8 sm:ml-0">
                            <span class="text-xs flex items-center gap-1 text-white/70 bg-white/5 px-2 py-1 rounded-md border border-white/5">
                                <i class="ph-bold ph-arrow-right text-white/50"></i> Medium
                            </span>
                            <!-- Assigned avatar simulating 'RA' -->
                            <div class="w-6 h-6 rounded-full bg-white/10 border border-white/10 flex items-center justify-center text-[10px] text-white/70 font-medium">RA</div>
                            <span class="text-xs font-medium tracking-wider text-white/30 hidden sm:block"></span>
                        </div>
                    </div>

                    <!-- Task 3 -->
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between p-4 rounded-2xl hover:bg-white/5 transition-all cursor-pointer hover:scale-[1.01] gap-4 sm:gap-0">
                        <div class="flex items-center gap-4">
                            <!-- Glowing Dot Status: Resolved -->
                            <div class="relative flex items-center justify-center w-4 h-4 shrink-0">
                                <div class="absolute inset-0 bg-emerald-500 rounded-full blur-[4px] opacity-60"></div>
                                <div class="w-2 h-2 bg-emerald-400 rounded-full relative z-10"></div>
                            </div>
                            <div>
                                <h3 class="text-sm text-white/50 line-through transition-all">bankend</h3>
                                <p class="text-xs text-white/40 mt-1">School ERP <span class="mx-1">•</span> Resolved</p>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-4 sm:gap-6 ml-8 sm:ml-0">
                            <span class="text-xs flex items-center gap-1 text-white/70 bg-white/5 px-2 py-1 rounded-md border border-white/5">
                                <i class="ph-bold ph-arrow-right text-white/50"></i> Medium
                            </span>
                            <span class="text-xs font-medium tracking-wider text-rose-400/80">25/06/2026</span>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Right Column Stack -->
            <div class="space-y-6 flex flex-col h-full">
                
                <!-- Active Projects Widget -->
                <div class="bg-white/[0.02] backdrop-blur-xl border border-white/[0.05] rounded-[32px] p-6 md:p-8 hover:scale-[1.02] transition-transform duration-300">
                    <h2 class="text-sm text-white/90 font-medium mb-6">Active Projects</h2>
                    
                    <div class="space-y-2">
                        <!-- Project Item -->
                        <div class="group flex justify-between items-center p-4 rounded-2xl bg-white/5 border border-white/[0.02] hover:bg-white/10 transition-colors cursor-pointer">
                            <h3 class="text-sm text-white/90 font-medium">School ERP</h3>
                            <i class="ph-bold ph-caret-right text-white/30 group-hover:text-white/70 transition-colors"></i>
                        </div>
                    </div>
                </div>

                <!-- Team Notepad Widget -->
                <div class="bg-white/[0.02] backdrop-blur-xl border border-white/[0.05] rounded-[32px] p-6 md:p-8 flex-1 flex flex-col hover:scale-[1.02] transition-transform duration-300">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-sm text-white/90 font-medium">Team Notepad</h2>
                        <!-- Archive icon replaced trash icon -->
                        <button class="text-white/30 hover:text-white/70 transition-colors" title="Archive Note">
                            <i class="ph ph-archive text-lg"></i>
                        </button>
                    </div>
                    
                    <div class="flex-1 space-y-4 mb-6">
                        <!-- Note Item -->
                        <div class="group bg-white/[0.01] rounded-xl p-3 border border-white/[0.03]">
                            <p class="text-sm text-white/90 leading-relaxed mb-2">ds</p>
                            <p class="text-[10px] text-white/40 uppercase tracking-widest font-medium">
                                Jun 25, 07:39 PM — rahul
                            </p>
                        </div>
                    </div>
                    
                    <!-- Input Area -->
                    <div class="mt-auto relative flex items-center">
                        <input 
                            type="text" 
                            placeholder="Write a note..." 
                            class="w-full bg-black/40 border border-white/10 rounded-xl py-2.5 pl-4 pr-20 outline-none text-sm text-white placeholder-white/30 focus:border-white/30 transition-colors"
                        />
                        <div class="absolute right-1.5 flex items-center gap-1">
                            <button class="p-1.5 text-white/30 hover:text-white/70 transition-colors" title="Expand">
                                <i class="ph-bold ph-caret-up-down text-sm"></i>
                            </button>
                            <button class="p-1.5 bg-white/10 hover:bg-white/20 rounded-lg text-white transition-colors" title="Send">
                                <i class="ph-fill ph-paper-plane-right text-sm"></i>
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Simple script to handle tab switching visually for demonstration
        document.addEventListener('DOMContentLoaded', () => {
            const tabs = document.querySelectorAll('.flex.gap-6 button');
            
            tabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    // Reset all tabs
                    tabs.forEach(t => {
                        t.className = 'text-sm font-medium pb-4 -mb-[17px] text-white/50 hover:text-white transition-colors';
                    });
                    
                    // Set active tab
                    e.target.className = 'text-sm font-medium pb-4 -mb-[17px] text-white border-b-2 border-white transition-colors';
                });
            });
        });
    </script>
</body>
</html>
